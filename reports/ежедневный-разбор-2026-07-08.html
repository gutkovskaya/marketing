<title>Каталог отчётов · защищено</title>
<style>
  :root{color-scheme:light dark}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:#f4f5f7;color:#1a1a1a}
  @media (prefers-color-scheme:dark){body{background:#0f1115;color:#e8e8e8}}
  .card{width:min(92vw,380px);padding:32px 28px;border-radius:16px;background:#fff;
        box-shadow:0 10px 40px rgba(0,0,0,.12);text-align:center}
  @media (prefers-color-scheme:dark){.card{background:#181b21;box-shadow:0 10px 40px rgba(0,0,0,.5)}}
  .lock{font-size:34px;margin-bottom:6px}
  h1{font-size:18px;margin:0 0 4px}
  p.sub{font-size:13px;opacity:.65;margin:0 0 20px}
  input{width:100%;padding:12px 14px;font-size:15px;border-radius:10px;border:1px solid #d0d3d9;
        background:#fbfbfc;color:inherit;outline:none}
  @media (prefers-color-scheme:dark){input{background:#0f1115;border-color:#2a2f3a}}
  input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
  button{width:100%;margin-top:12px;padding:12px 14px;font-size:15px;font-weight:600;border:0;
         border-radius:10px;background:#2563eb;color:#fff;cursor:pointer}
  button:hover{background:#1d4ed8}
  .err{color:#dc2626;font-size:13px;height:18px;margin-top:10px}
</style>
</head>
<body>
  <form class="card" id="f" autocomplete="off">
    <div class="lock">🔒</div>
    <h1>Каталог отчётов</h1>
    <p class="sub">Маркетинг · доступ по паролю</p>
    <input type="password" id="pw" placeholder="Пароль" autofocus>
    <button type="submit">Открыть</button>
    <div class="err" id="e"></div>
  </form>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64(DATA.salt),iterations:DATA.iter,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
  const buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(DATA.iv)},key,b64(DATA.ct));
  return new TextDecoder().decode(buf);
}
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const pw=document.getElementById('pw').value;
  try{const html=await decrypt(pw);localStorage.setItem('catalog_pw',pw);document.open();document.write(html);document.close();}
  catch(_){document.getElementById('e').textContent='Неверный пароль';}
});
// авто-вход, если пароль уже вводили (localStorage — общий для всех вкладок)
(async()=>{
  const pw=localStorage.getItem('catalog_pw');
  if(!pw)return;
  try{const html=await decrypt(pw);document.open();document.write(html);document.close();}catch(_){}
})();
</script>
